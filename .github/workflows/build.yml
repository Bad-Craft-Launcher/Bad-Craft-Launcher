name: Build CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  RUSTUP_TOOLCHAIN: nightly

jobs:
  build:
    name: Build - ${{ matrix.display }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - display: linux-x86_64
            runs_on: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            arch: x86_64

          - display: linux-aarch64
            runs_on: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu
            arch: aarch64

          - display: macos-x86_64
            runs_on: macos-latest
            rust_target: x86_64-apple-darwin
            arch: x86_64

          - display: macos-aarch64
            runs_on: macos-latest
            rust_target: aarch64-apple-darwin
            arch: aarch64

          - display: windows-x86_64
            runs_on: windows-latest
            rust_target: x86_64-pc-windows-msvc
            arch: x86_64

          - display: windows-aarch64
            runs_on: windows-latest
            rust_target: aarch64-pc-windows-msvc
            arch: aarch64

    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
          run_install: false

      - name: Install Tauri dependency
        run: pnpm install

      - name: Install clang + lld (Linux)
        if: ${{ matrix.runs_on == 'ubuntu-latest' }}
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends clang lld pkg-config libssl-dev build-essential
          clang --version
          ld.lld --version || true

      - name: Install llvm (macOS)
        if: ${{ matrix.runs_on == 'macos-latest' }}
        run: |
          brew update || true
          brew install llvm || true
          llvm_prefix=$(brew --prefix llvm)
          echo "PATH=${llvm_prefix}/bin:$PATH" >> $GITHUB_ENV

      - name: Install LLVM (Windows)
        if: ${{ matrix.runs_on == 'windows-latest' }}
        shell: powershell
        run: |
          choco install -y llvm
          $llvmPath = 'C:\Program Files\LLVM\bin'
          echo "PATH=$llvmPath;${env:PATH}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup Rust nightly
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
          profile: default

      - name: Add rust target
        run: rustup target add ${{ matrix.rust_target }}

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
            target
          key: cargo-cache-${{ matrix.display }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Linux packaging deps
        if: ${{ matrix.runs_on == 'ubuntu-latest' }}
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libwebkit2gtk-4.0 libayatana-appindicator3-dev \
            librsvg2-dev patchelf rpm appstream libarchive-tools binutils zstd pkg-config
            
      - name: Build Tauri App
        env:
          CC: clang
          CXX: clang++
        run: |
          pnpm tauri build --target ${{ matrix.rust_target }}

      - name: Upload built bundles
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.display }}
          path: |
            src-tauri/target/*/release/bundle/**
            src-tauri/target/release/bundle/**
          retention-days: 7
