name: Build Artifact

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            arch: x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows
            arch: arm64
            runner: windows-latest
            target: aarch64-pc-windows-msvc
          - os: macos
            arch: x64
            runner: macos-latest
            target: x86_64-apple-darwin
          - os: macos
            arch: arm64
            runner: macos-latest
            target: aarch64-apple-darwin
          - os: linux
            arch: x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: linux
            arch: arm64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu

    env:
      RUST_BACKTRACE: full

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Setup Rust Nightly (all components)
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
          target: ${{ matrix.target }}
          profile: complete
          components: rust-src,clippy,rustfmt

      - name: Install Clang on Linux
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld

      - name: Install Clang on macOS
        if: matrix.os == 'macos'
        run: |
          brew update
          brew install llvm
          echo "/opt/homebrew/opt/llvm/bin" >> $GITHUB_PATH
          echo "CC=$(brew --prefix llvm)/bin/clang" >> $GITHUB_ENV
          echo "CXX=$(brew --prefix llvm)/bin/clang++" >> $GITHUB_ENV

      - name: Install LLVM/Clang on Windows
        if: matrix.os == 'windows'
        run: choco install llvm --version=17.0.6 -y

      - name: Install system deps (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev \
            build-essential lld pkg-config curl wget squashfs-tools flatpak rpm gnupg2 \
            arch-install-scripts zstd patchelf

      - name: Tauri Windows build deps (仅x86_64, arm64)
        if: matrix.os == 'windows'
        run: |
          choco install gtk-runtime --yes --limit-output

      - name: Export Clang as CC/CXX (Linux/Windows/macos)
        run: |
          echo "CC=clang" >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV

      - name: Build frontend
        run: pnpm run tauri build

      - name: Build Tauri for ${{ matrix.target }}
        run: >
          pnpm dlx tauri build --target ${{ matrix.target }}

      - name: Create Linux packages
        if: matrix.os == 'linux'
        run: |
          pnpm dlx tauri build --target ${{ matrix.target }} --bundles deb,rpm,appimage,flatpak,arch

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-artifacts
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**
            dist/**