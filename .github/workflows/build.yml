name: Build Artifact

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            arch: x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows
            arch: arm64
            runner: windows-latest
            target: aarch64-pc-windows-msvc
          - os: macos
            arch: x86_64
            runner: macos-latest
            target: x86_64-apple-darwin
          - os: macos
            arch: arm64
            runner: macos-latest
            target: aarch64-apple-darwin
          - os: linux
            arch: x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: linux
            arch: arm64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu

    env:
      RUST_BACKTRACE: full

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install frontend dependencies
        run: |
          npm install -g pnpm
          pnpm install

      - name: Setup Rust Nightly
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
          target: ${{ matrix.target }}
          components: rust-src
          
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm

      - name: Build Tauri App (macOS)
        if: matrix.os == 'macos'
        run: pnpm run tauri build --bundles app --target ${{ matrix.target }}

      - name: Build Tauri App 
        if: matrix.os != 'macos'
        run: pnpm run tauri build --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ matrix.os }}-${{ matrix.arch }}-artifacts
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**
            dist/**
